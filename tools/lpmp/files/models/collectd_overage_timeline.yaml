########################################################################
#
# Model:   Collectd Overage Timeline
# Purpose: Profile and graph collectd overage (warning/failure
#          threshold) events from collectd.log using timeline mode.
#
########################################################################
#
# Block Fields:
#   label    - (required) block identifier
#   file     - (required) log file glob pattern(s)
#   timeline - list of patterns to collect (any order)
#
# Settings:
#   graph    - label used for timeline graph output
#
########################################################################

settings:
  graph: "{graph}"

blocks:
  - label: "{graph}"
    file: "collectd.log*"
    timeline:
    - "{graph}"
