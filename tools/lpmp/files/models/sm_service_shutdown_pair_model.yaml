########################################################################
#
# Model:   SM Service Shutdown Pair Model
# Purpose: Measure duration of each SM service disable operation
#          during shutdown using pair blocks (start/stop patterns)
#          to time individual service disable actions in sm.log.
#
########################################################################
#
# Block Fields (trigger pattern block):
#   label    - (required) block identifier
#   file     - (required) log file glob pattern(s)
#   patterns - list of sequential patterns to match
#
# Block Fields (pair blocks):
#   label    - (required) block identifier
#   file     - (required) log file glob pattern(s)
#   start    - start pattern (regex) for duration measurement
#   stop     - stop pattern (regex) for duration measurement
#   optional - skip with warning if not found (default: false)
#   present  - include if start pattern is present
#
# Pattern Syntax:
#   - "string"                  - literal match
#   - r"regex \d+"             - regex match
#
########################################################################

# Settings for pair mode
settings:
  optional: true
  block_time_tolerance: 15  # time tolerance for out-of-order log entries

blocks:
  - label: "SH Service Shutdown Trigger"
    file: ["sm.log*"]
    patterns:
      - ".*Node enable: blocked. node unhealthy file /var/run/.sm_node_unhealthy found"

  - label: "cert-alarm"
    file: ["sm.log*"]
    start: 'Started disable action.*for service \(cert-alarm\)'
    stop: 'Action \(disable\) completed.*for service \(cert-alarm\)'

  - label: "device-image-fs"
