# Ansible Bootstrap Configurations - user configuration overrides
#
# Shared across on-site flows (onsite-enrollment, onsite-restore).
# System and network bootstrap properties can be specified here as outlined
# in the StarlingX documentation. For instance, OAM network configuration
# can be specified: external_oam_subnet, external_oam_gateway_address,
# external_oam_floating_address, etc.
#
# Field consumption per mode:
#   - onsite-enrollment: full schema (all fields below) is consumed by
#     dcmanager during enrollment.
#   - onsite-restore: only the platform-reconfigure subset
#     (system_mode, name, external_oam_*, systemcontroller_oam_address,
#     sysadmin_password, ssl_ca_cert, admin_*) is consumed locally by
#     10-platform-reconfig and 90-trigger-onsite-restore. Other fields
#     are ignored on the restore path.
#

system_mode: simplex
name: "subcloud1"

description: "test"
location: "loc"

management_subnet: 192.168.101.0/24
management_start_address: 192.168.101.2
management_end_address: 192.168.101.50
management_gateway_address: 192.168.101.1

external_oam_subnet: 10.10.10.0/24
external_oam_gateway_address: 10.10.10.1
external_oam_floating_address: 10.10.10.12

systemcontroller_gateway_address: 192.168.204.101

# System controller OAM address and credentials
systemcontroller_oam_address: 10.10.10.2
sysadmin_password: St8rlingX*1234

# CA cert to install on the subcloud for OAM network communication.
# Cert needs to be stored alongside this file in the config/ directory.
# ssl_ca_cert: ssl_ca.pem

docker_registries:
  k8s.gcr.io:
    url: registry.central:9001/k8s.gcr.io
  gcr.io:
    url: registry.central:9001/gcr.io
  ghcr.io:
    url: registry.central:9001/ghcr.io
  quay.io:
    url: registry.central:9001/quay.io
  docker.io:
    url: registry.central:9001/docker.io
  docker.elastic.co:
    url: registry.central:9001/docker.elastic.co
  registry.k8s.io:
    url: registry.central:9001/registry.k8s.io
  icr.io:
    url: registry.central:9001/icr.io
  defaults:
    username: sysinv
    password: <sysinv_password>
    type: docker

admin_username: admin
admin_password: St8rlingX*1234
