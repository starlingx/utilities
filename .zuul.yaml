---
- project:
    check:
      jobs:
        - stx-utilities-tox-linters
        - stx-utilities-tox-pep8
        - stx-utilities-tox-pylint
        - stx-utilities-tox-go-lint
        - stx-utilities-ceph-manager-tox-bandit
        - stx-utilities-ceph-manager-tox-py39
        - stx-utilities-ceph-client-tox-bandit
        - stx-utilities-pci-irq-affinity-agent-tox-py39
        - stx-utilities-pci-irq-affinity-agent-tox-pep8
        - stx-utilities-k8s-coredump-tox-py39
        - stx-utilities-nocloud-factory-install-tox-py39
        - stx-utilities-nocloud-factory-install-tox-pep8
        - stx-utilities-nocloud-factory-install-tox-pylint
        - stx-utilities-nocloud-factory-install-tox-bandit
        - stx-utilities-nocloud-factory-install-tox-linters
    gate:
      jobs:
        - stx-utilities-tox-linters
        - stx-utilities-tox-pep8
        - stx-utilities-tox-pylint
        - stx-utilities-tox-go-lint
        - stx-utilities-ceph-manager-tox-bandit
        - stx-utilities-ceph-manager-tox-py39
        - stx-utilities-ceph-client-tox-bandit
        - stx-utilities-pci-irq-affinity-agent-tox-py39
        - stx-utilities-pci-irq-affinity-agent-tox-pep8
        - stx-utilities-k8s-coredump-tox-py39
        - stx-utilities-nocloud-factory-install-tox-py39
        - stx-utilities-nocloud-factory-install-tox-pep8
        - stx-utilities-nocloud-factory-install-tox-pylint
        - stx-utilities-nocloud-factory-install-tox-bandit
        - stx-utilities-nocloud-factory-install-tox-linters
    post:
      jobs:
        - stx-utilities-upload-git-mirror

- job:
    name: stx-utilities-tox-linters
    parent: tox
    nodeset: debian-bullseye
    vars:
      tox_envlist: linters

- job:
    name: stx-utilities-tox-pep8
    parent: tox
    nodeset: debian-bullseye
    vars:
      tox_envlist: pep8

- job:
    name: stx-utilities-tox-pylint
    parent: tox
    nodeset: debian-bullseye
    description: |
      Run pylint tests
    required-projects:
      - starlingx/fault
      - starlingx/config
    vars:
      bindep_profile: pylint
      tox_envlist: pylint

- job:
    name: stx-utilities-tox-go-lint
    parent: golangci-lint
    description: |
            Run go linting for openbao-monitor
    vars:
      go_version: 1.24.3
      golangci_lint_version: 2.1.6
      zuul_work_dir: "{{ zuul.project.src_dir }}/security/openbao-monitor/source"

- job:
    name: stx-utilities-upload-git-mirror
    parent: upload-git-mirror
    description: >
      Mirrors opendev.org/starlingx/utilities to
      github.com/starlingx/utilities
    vars:
      git_mirror_repository: starlingx/utilities
    secrets:
      - name: git_mirror_credentials
        secret: stx-utilities-github-secret3
        pass-to-parent: true

- job:
    name: stx-utilities-ceph-manager-tox-bandit
    parent: tox
    description: |
      Run bandit test for utilities ceph-mananger
    nodeset: debian-bullseye
    files:
      - ./ceph/ceph-manager/ceph-manager/*
    vars:
      tox_envlist: bandit
      tox_extra_args: -c ./ceph/ceph-manager/ceph-manager/tox.ini

- job:
    name: stx-utilities-ceph-manager-tox-py39
    parent: tox
    description: |
       Run py39 unittests for utilities ceph-mananger
    nodeset: debian-bullseye
    files:
      - ./ceph/ceph-manager/ceph-manager/*
    vars:
      tox_envlist: py39
      python_version: 3.9
      tox_extra_args: -c ./ceph/ceph-manager/ceph-manager/tox.ini

- job:
    name: stx-utilities-ceph-client-tox-bandit
    parent: tox
    description: |
      Run bandit test for utilities python-cephclient
    nodeset: debian-bullseye
    files:
      - ./ceph/python-cephclient/python-cephclient/*
    vars:
      tox_envlist: bandit
      tox_extra_args: -c ./ceph/python-cephclient/python-cephclient/tox.ini

- job:
    name: stx-utilities-pci-irq-affinity-agent-tox-py39
    voting: false
    parent: tox
    description: |
      Run py39 unittests for utilities/pci-irq-affinity-agent
    nodeset: debian-bullseye
    files:
      - ./utilities/pci-irq-affinity-agent/*
    vars:
      tox_envlist: py39
      python_version: 3.9
      tox_extra_args: -c ./utilities/pci-irq-affinity-agent/pci_irq_affinity/tox.ini

- job:
    name: stx-utilities-pci-irq-affinity-agent-tox-pep8
    parent: tox
    description: |
      Run flake8 checks for utilities/pci-irq-affinity-agent
    nodeset: debian-bullseye
    files:
      - ./utilities/pci-irq-affinity-agent/*
    vars:
      tox_envlist: pep8
      tox_extra_args: -c ./utilities/pci-irq-affinity-agent/pci_irq_affinity/tox.ini

- job:
    name: stx-utilities-k8s-coredump-tox-py39
    parent: tox-py39
    description: Run py39 tests for k8s-coredump
    nodeset: debian-bullseye
    files:
      - utilities/k8s-coredump/k8s-coredump/*
    vars:
      tox_envlist: py39
      tox_extra_args: -c utilities/k8s-coredump/k8s-coredump/tox.ini

- job:
    name: stx-utilities-nocloud-factory-install-tox-py39
    parent: tox
    description: Run py39 tests for nocloud-factory-install
    nodeset: debian-bullseye
    files:
      - tools/nocloud-factory-install/*
    vars:
      tox_envlist: py39
      tox_extra_args: -c tools/nocloud-factory-install/tox.ini

- job:
    name: stx-utilities-nocloud-factory-install-tox-pep8
    parent: tox
    description: Run pep8 checks for nocloud-factory-install
    nodeset: debian-bullseye
    files:
      - tools/nocloud-factory-install/*
    vars:
      tox_envlist: pep8
      tox_extra_args: -c tools/nocloud-factory-install/tox.ini

- job:
    name: stx-utilities-nocloud-factory-install-tox-pylint
    parent: tox
    description: Run pylint checks for nocloud-factory-install
    nodeset: debian-bullseye
    files:
      - tools/nocloud-factory-install/*
    vars:
      tox_envlist: pylint
      tox_extra_args: -c tools/nocloud-factory-install/tox.ini

- job:
    name: stx-utilities-nocloud-factory-install-tox-bandit
    parent: tox
    description: Run bandit checks for nocloud-factory-install
    nodeset: debian-bullseye
    files:
      - tools/nocloud-factory-install/*
    vars:
      tox_envlist: bandit
      tox_extra_args: -c tools/nocloud-factory-install/tox.ini

- job:
    name: stx-utilities-nocloud-factory-install-tox-linters
    parent: openstack-tox-linters
    description: Run linters (bashate and yamllint) for nocloud-factory-install
    nodeset: debian-bullseye
    files:
      - tools/nocloud-factory-install/*
    vars:
      tox_envlist: linters
      tox_extra_args: -c tools/nocloud-factory-install/tox.ini

